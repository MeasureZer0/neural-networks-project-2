name: Ruff

on: [push]

jobs:
    ruff-check:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - name: Setup Ruff
              uses: astral-sh/ruff-action@v3
              with:
                  version: "0.15.0"
            - name: Ruff check
              run: ruff check --output-format=github .
